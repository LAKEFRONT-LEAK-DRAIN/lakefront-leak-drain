name: Gemini Video Alignment Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-video-alignment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-genai requests

      - name: Prepare test feed file
        run: cp video_feed.xml video_feed_alignment_test.xml

      - name: Run alignment-mode video updater (test only)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          ALLOW_PEXELS_FALLBACK: 'true'
          ENFORCE_TEXT_VIDEO_ALIGNMENT: 'true'
          VIDEO_FEED_FILE: video_feed_alignment_test.xml
        run: python video_update_feed_alignment_test.py

      - name: Upload test feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-feed-alignment-test
          path: |
            video_feed_alignment_test.xml
            video/*.html
          if-no-files-found: warn
