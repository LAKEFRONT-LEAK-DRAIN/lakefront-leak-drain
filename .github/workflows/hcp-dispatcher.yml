name: HCP Automation Dispatcher

on:
  push:
    paths:
      - 'hcp-automation/pending-tasks/**'

jobs:
  run-hcp-logic:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Execute Lakefront Automation Engine
        env:
          HCP_API_TOKEN: ${{ secrets.HCP_API_TOKEN }}
        shell: pwsh
        run: |
          # 1. Identify tasks changed in this push only
          $pendingFolder = "hcp-automation/pending-tasks"
          $completedFolder = "hcp-automation/completed-tasks"
          $scriptsFolder = "hcp-automation/scripts"

          $beforeSha = "${{ github.event.before }}"
          $afterSha = "${{ github.sha }}"

          if ($beforeSha -match '^0+$') {
            $changedPaths = git show --name-only --pretty="" $afterSha -- $pendingFolder
          }
          else {
            $changedPaths = git diff --name-only $beforeSha $afterSha -- $pendingFolder
          }

          $files = @($changedPaths |
            Where-Object { $_ -match '\.json$' } |
            ForEach-Object { Join-Path $PWD $_ } |
            Where-Object { Test-Path $_ } |
            Get-Item)

          if ($files.Count -eq 0) {
            Write-Host "No changed pending-task JSON files found in this push. Exiting."
              exit 0
          }

          foreach ($file in $files) {
              Write-Host "--- STARTING PROCESSING: $($file.Name) ---"
              
              try {
                  # 2. Trigger the Master Controller
                  # This runs the full Search -> Create -> Link -> Work sequence
                  & "$scriptsFolder/hcp_master_controller.ps1" -taskFile $file.FullName
                  
                  # 3. Archive the Task on Success
                  if (-not (Test-Path $completedFolder)) {
                    New-Item -Path $completedFolder -ItemType Directory -Force | Out-Null
                  }

                  $archivePath = Join-Path $completedFolder $file.Name
                  if (Test-Path $archivePath) {
                    $stamp = (Get-Date).ToString("yyyyMMdd-HHmmss-fff")
                    $baseName = [System.IO.Path]::GetFileNameWithoutExtension($file.Name)
                    $archivePath = Join-Path $completedFolder ("$baseName-$stamp$($file.Extension)")
                  }

                  Move-Item -Path $file.FullName -Destination $archivePath
                  Write-Host "--- SUCCESS: $($file.Name) Archived as $(Split-Path $archivePath -Leaf) ---"
              }
              catch {
                  Write-Error "Failed to process $($file.Name): $($_.Exception.Message)"
                  # Optional: Move to an 'errors' folder here if you create one
              }
          }