name: Gemini Automated Feed Updater
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  update-feed:
    if: contains(github.event.comment.body, '@gemini-cli')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Gemini SDK
        run: pip install google-generativeai

      - name: Run Gemini AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python -c "
          import os
          import google.generativeai as genai
          
          genai.configure(api_key=os.environ['GEMINI_API_KEY'])
          model = genai.GenerativeModel('gemini-1.5-flash')
          
          with open('feed.xml', 'r', encoding='utf-8') as f:
              current_feed = f.read()
              
          prompt = f'''
          You are an AI assistant managing an RSS feed for a plumbing company.
          The user requested this update: {os.environ['COMMENT_BODY']}
          
          Here is the current feed.xml:
          {current_feed}
          
          Update the XML based on the request. 
          CRITICAL: Output ONLY the raw XML code. Do not include markdown formatting like \`\`\`xml or any conversational text. Just the code.
          '''
          
          response = model.generate_content(prompt)
          new_xml = response.text.strip()
          
          if new_xml.startswith('```xml'):
              new_xml = new_xml[6:]
          if new_xml.endswith('```'):
              new_xml = new_xml[:-3]
              
          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(new_xml.strip())
          "

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated XML update by Gemini AI"