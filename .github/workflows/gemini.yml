name: Gemini Automated Feed Updater
on:
  schedule:
    - cron: '0 10 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install SDKs
        run: pip install google-genai requests

      - name: Create and Run Python Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat << 'EOF' > update_feed.py
          import os
          import requests
          from google import genai
          from datetime import datetime
          
          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
          
          # 1. Ask Gemini for a Topic and a Search Keyword
          topic_prompt = "Invent a seasonal Cleveland plumbing topic. Output ONLY the title and a 3-word image search keyword separated by a pipe character. Example: Cleaning Gutters | clogged rain gutter"
          resp = client.models.generate_content(model='gemini-2.5-flash', contents=topic_prompt)
          title, search_keyword = resp.text.strip().split('|')
          
          # 2. Search Pexels for a matching photo
          image_url = "https://lakefrontleakanddrain.com/logo.jpg" # Default fallback
          try:
              headers = {"Authorization": os.environ['PEXELS_API_KEY']}
              pexels_resp = requests.get(f"https://api.pexels.com/v1/search?query={search_keyword}&per_page=1", headers=headers)
              image_url = pexels_resp.json()['photos'][0]['src']['large']
          except:
              pass # Use logo if search fails
          
          # 3. Generate the RSS Item with the new image
          today_str = datetime.utcnow().strftime('%a, %d %b %Y 10:00:00 GMT')
          xml_prompt = f"Write a valid RSS <item> block for a post titled '{title}'. Use {image_url} for the image and video links. Output ONLY raw XML."
          
          final_resp = client.models.generate_content(model='gemini-2.5-flash', contents=xml_prompt)
          new_item = final_resp.text.strip().replace('```xml', '').replace('```', '').strip()
          
          # 4. Inject into feed.xml
          with open('feed.xml', 'r', encoding='utf-8') as f:
              feed = f.read()
          insert_pos = feed.rfind('</channel>')
          if insert_pos != -1:
              updated_feed = feed[:insert_pos] + '    ' + new_item + '\n\n' + feed[insert_pos:]
              with open('feed.xml', 'w', encoding='utf-8') as f:
                  f.write(updated_feed)
          EOF
          
          python update_feed.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Autonomous Update: New post with matching image"